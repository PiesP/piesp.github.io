---
layout: default
---

<h1>{{ page.title }}</h1>

{% for category in site.categories %}
  {% if category[0] == page.title %}
    {% assign posts = category[1] | sort: 'date' | reverse %}
    {% for post in posts %}
      <p><a href="{{ post.url }}">{{ post.title }}</a></p>
    {% endfor %}
  {% endif %}
{% endfor %}

---
layout: default
title: "Main Page"
categories: Main
---

<h2>New Posts</h2>
{% for category in site.categories %}
  <ul>
    <h3>{{ category[0] }}</h3>
    {% assign posts = category[1] | sort: 'date' | reverse %}
    {% for post in posts limit:5 %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
{% endfor %}
